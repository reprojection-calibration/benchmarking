name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

# https://stackoverflow.com/questions/66335225/how-to-cancel-previous-runs-in-the-pr-when-you-push-new-commitsupdate-the-curre
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # TODO(Jack): We should think about using gha "cache" as possible way to speed up the data handling here. It is just
  # not needed to uploaded the artifact everytime and download it again. If we can just upload it once and store it in
  # the cache that would make a lot of sense.
  test-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download TUM test data
        uses: ./.github/actions/docker-build
        with:
          cache_scope: test-data-download
          context: .
          load: true
          tag: benchmarking:test-data-download-stage
          target: test-data-download-stage
      - name: Pack the test data into a zip file
        run: |
          set -eou pipefail
    
          mkdir --parents "${RUNNER_TEMP}/artifacts"
          
          # NOTE(Jack): We actually do not apply any compression here because using --gzip was taking a long time. Is 
          # this ok? I think the upload-artifact action should itself do compression. Does it really matter?
          docker run \
            --mount "type=bind,source=${RUNNER_TEMP}/artifacts,target=/artifacts" \
            --mount "type=volume,source=benchmarking-data,target=/data,readonly" \
            --rm \
            benchmarking:test-data-download-stage \
              tar \
                --create \
                --directory=/data \
                --file=/artifacts/benchmarking-data.tar \
                --verbose \
                .

      - name: Upload zipped test data
        uses: actions/upload-artifact@v7
        with:
          name: benchmarking-data-zip
          path: ${{ runner.temp }}/artifacts/benchmarking-data.tar
          if-no-files-found: error

  kalibr-pipeline:
    needs: test-data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build the Kalibr image
        uses: ./.github/actions/docker-build
        with:
          cache_scope: kalibr-build
          context: thirdparty/kalibr
          file: thirdparty/kalibr/Dockerfile_ros1_20_04
          load: true
          tag: kalibr
      # TOOD(Jack): Because will will likely use this exact same image for the reprojection pipeline, it would be nice
      # to only build it once and use the same image in both places just with the entrypoint overriden.
      - name: Build the python tooling image
        uses: ./.github/actions/docker-build
        with:
          cache_scope: python-tooling
          context: .
          load: true
          tag: benchmarking:python-tooling-stage
          target: python-tooling-stage
      - name: Download test data
        uses: actions/download-artifact@v8
        with:
          name: benchmarking-data-zip
          path: ${{ runner.temp }}/artifacts
      # TODO(Jack): We will likely have this exact same step in the reprojection pipeline, should we make this into a
      # reusable action code block then?
      - name: Load test data into docker volume
        run: |
          set -eou pipefail

          docker volume create benchmarking-data

          docker run \
            --mount "type=volume,source=benchmarking-data,target=/data" \
            --mount "type=bind,source=${RUNNER_TEMP}/artifacts,target=/artifacts,readonly" \
            --rm \
            ubuntu:24.04 \
              tar \
                --directory=/data \
                --extract \
                --file=/artifacts/benchmarking-data.tar \
                --verbose

      - name: Run experiment
        run: |
          set -eou pipefail
          
          # NOTE(Jack): We do not need to build anything here or run the test data portion of the compose file because 
          # both test data and kalibr build stages are built and cached in the pipeline before. We split this up in the 
          # gha CI because if we just ran it all here we would not be able to cache anything using the gha tooling. 
          docker compose --file compose.benchmark.yaml \
            run --no-deps --rm kalibr
          
          docker compose --file compose.benchmark.yaml \
            run --no-deps --rm python-tooling

      - name: Upload parsed kalibr results
        uses: actions/upload-artifact@v7
        with:
          name: parsed-kalibr-result
          path: ${{ github.workspace }}/parsed_kalibr_result.csv
          if-no-files-found: error