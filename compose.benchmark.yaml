services:
  test-data:
    build:
      context: ./
      dockerfile: Dockerfile
      target: test-data-download-stage
    command: [ "/bin/bash", "-c", "set -eou pipefail; cp --recursive /data/. /volume/mount/" ]
    image: benchmarking:test-data-download-stage
    volumes:
      - benchmarking-data:/volume/mount

  kalibr:
    build:
      context: thirdparty/kalibr
      dockerfile: Dockerfile_ros1_20_04
    depends_on:
      test-data:
        condition: service_completed_successfully
    entrypoint: /temporary/scripts/kalibr_entrypoint.sh
    image: kalibr:latest
    volumes:
      - benchmarking-data:/data
      - ./scripts/kalibr_entrypoint.sh:/temporary/scripts/kalibr_entrypoint.sh:ro
      - ./config:/temporary/config:ro

  python-tooling:
    build:
      context: ./
      dockerfile: Dockerfile
      target: python-tooling-stage
    depends_on:
      kalibr:
        condition: service_completed_successfully
    # NOTE(Jack): This line here is important because it writes the parsed output directly to the host and not a docker
    # volume! If this is a long term strategy I am not 100% sure.
    # TODO(Jack): One day we will also need to parse the reprojection results from here, make sure to adjust all naming
    # and contexts to reflect that!
    entrypoint: ["python3", "/python_tooling/parse_kalibr.py", "/data/kalibr", "/temporary/output/parsed_kalibr_result.csv"]
    image: benchmarking:python-tooling-stage
    volumes:
      - benchmarking-data:/data
      - ./:/temporary/output

volumes:
  benchmarking-data:
    name: benchmarking-data