services:
  test-data:
    build:
      context: ./
      dockerfile: Dockerfile
      target: test-data-download-stage
    # TODO CHECK FOR PREMATURE EXPANSION! $$
    command: [ "/bin/bash", "-c", "set -eoux pipefail; cp --recursive /data/. ${BENCHMARKING_DATA_INPUT_DIR}/" ]
    environment:
      - BENCHMARKING_DATA_INPUT_DIR
    image: benchmarking:test-data-download-stage
    volumes:
      - benchmarking-data-input:${BENCHMARKING_DATA_INPUT_DIR}

  kalibr:
    build:
      context: thirdparty/kalibr
      dockerfile: Dockerfile_ros1_20_04
    depends_on:
      test-data:
        condition: service_completed_successfully
    entrypoint: /temporary/scripts/kalibr_entrypoint.sh
    environment:
      - BENCHMARKING_DATA_INPUT_DIR
      - BENCHMARKING_RESULTS_DIR
    image: kalibr:latest
    volumes:
      # NOTE(Jack): I would like to mount this volume as readonly but Kalibr writes the results to the data directory by
      # default so we need it to be read/write.
      - benchmarking-data-input:${BENCHMARKING_DATA_INPUT_DIR}
      - benchmarking-results:${BENCHMARKING_RESULTS_DIR}
      - ./scripts/kalibr_entrypoint.sh:/temporary/scripts/kalibr_entrypoint.sh:ro
      - ./config:/temporary/config:ro

  python-tooling-image:
    build:
      context: ./
      dockerfile: Dockerfile
      target: python-tooling-stage
    image: benchmarking:python-tooling-stage

  parse-kalibr:
    depends_on:
      kalibr:
        condition: service_completed_successfully
      python-tooling-image:
        condition: service_completed_successfully
    image: benchmarking:python-tooling-stage
    # NOTE(Jack): This line here is important because it writes the parsed output directly to the host and not a docker
    # volume! If this is a long term strategy I am not 100% sure.
    entrypoint: ["python3", "/python_tooling/parse_kalibr.py", "/data/kalibr", "/temporary/output/parsed_kalibr_result.csv"]
    volumes:
      - benchmarking-data-input:/data
      - ./:/temporary/output

  build-results-page:
    depends_on:
      parse-kalibr:
        condition: service_completed_successfully
      python-tooling-image:
        condition: service_completed_successfully
    image: benchmarking:python-tooling-stage
    entrypoint: ["python3", "/python_tooling/build_html_webpage.py", "/temporary/output/index.html", "--results", "kalibr", "/temporary/output/parsed_kalibr_result.csv"]
    volumes:
      - ./:/temporary/output

volumes:
  benchmarking-data-input:
    name: benchmarking-data-input
  benchmarking-results:
    name: benchmarking-results